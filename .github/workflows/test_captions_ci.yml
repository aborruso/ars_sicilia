name: TEST captions da CI (diagnostico)

# Workflow usa-e-getta: verifica quale metodo di download sottotitoli funziona
# dagli IP dei runner GitHub. Da rimuovere una volta scelta la strada.

on:
  workflow_dispatch:
    inputs:
      youtube_id:
        description: "youtube_id da testare (deve avere sottotitoli ASR)"
        required: true
        default: "2dVWKAovY8g"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt

      - name: Ricostruisci credenziali captions (jq)
        env:
          CID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          CSEC: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          RT: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          mkdir -p config
          jq -n --arg id "$CID" --arg sec "$CSEC" \
            '{installed:{client_id:$id,client_secret:$sec,token_uri:"https://oauth2.googleapis.com/token",auth_uri:"https://accounts.google.com/o/oauth2/auth",redirect_uris:["http://localhost"]}}' \
            > config/youtube_secrets.json
          jq -n --arg rt "$RT" '{refresh_token:$rt}' > config/token.json
          echo "config/youtube_secrets.json e config/token.json creati"

      - name: "TEST A — API ufficiale (captions.download via OAuth)"
        id: api
        continue-on-error: true
        run: |
          . .venv/bin/activate
          set +e
          python scripts/download_caption_api.py \
            --youtube-id "${{ github.event.inputs.youtube_id }}" \
            --output-file /tmp/api_test.srt --lang it
          rc=$?
          echo "exit code: $rc"
          if [ -s /tmp/api_test.srt ]; then
            echo "=== API: PRIME RIGHE ==="; head -8 /tmp/api_test.srt
            echo "API_RESULT=OK ($(wc -c < /tmp/api_test.srt) bytes)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "API_RESULT=FAIL (rc=$rc, file vuoto/mancante)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: "TEST B — yt-dlp (auto-subs, endpoint pubblico)"
        id: ytdlp
        continue-on-error: true
        run: |
          . .venv/bin/activate
          set +e
          yt-dlp --skip-download --write-auto-subs --sub-langs it \
            --sub-format vtt -o '/tmp/ytdlp_test.%(ext)s' \
            "https://www.youtube.com/watch?v=${{ github.event.inputs.youtube_id }}"
          rc=$?
          echo "exit code: $rc"
          found=$(ls /tmp/ytdlp_test* 2>/dev/null)
          if [ -n "$found" ]; then
            echo "=== yt-dlp: FILE ==="; ls -la /tmp/ytdlp_test*
            echo "=== yt-dlp: PRIME RIGHE ==="; head -12 /tmp/ytdlp_test*.vtt 2>/dev/null
            echo "YTDLP_RESULT=OK" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "YTDLP_RESULT=FAIL (rc=$rc, nessun file sottotitoli)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Esito
        run: |
          echo "Controlla il Summary del run per l'esito dei due metodi."
